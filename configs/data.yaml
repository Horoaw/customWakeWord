# Augmentation + splits config for scripts/build_features.py.

split:
  train: 0.80
  val: 0.10
  test: 0.10
  seed: 42

reps:
  positive: 5         # each positive is replicated 5× with different augs in train
  hard_negative: 5
  bulk_negative: 1
  val: 1              # no augmentation reps in val/test
  test: 1

audio:
  sample_rate: 16000
  window_s: 1.5
  hop_s: 0.5          # for streaming windows over bulk negatives
  features:
    n_mels: 40
    win_ms: 60
    hop_ms: 25
    n_frames: 194     # microWakeWord's expected context

augment:
  room_simulator:
    p: 0.35
  apply_impulse_response:
    p: 0.35
    rir_corpora: ["openslr_28", "mit_mcdermott"]
  add_background_noise:
    p_positives: 0.9
    p_negatives: 0.6
    snr_db_min: -5
    snr_db_max: 25
    noise_corpora: ["musan_noise", "demand", "audioset_household"]
  pitch_shift:
    p: 0.3
    semitones_min: -2
    semitones_max: 2
  time_stretch:
    p: 0.3
    rate_min: 0.85
    rate_max: 1.15
  bandpass_filter:
    p: 0.5
    low_hz: 200
    high_hz: 7800
  mp3_compression:
    p: 0.2
    bitrate_min: 32
    bitrate_max: 96
  opus_compression:
    p: 0.2
    bitrate_min: 8
    bitrate_max: 24
  gain:
    p: 1.0
    gain_db_min: -10
    gain_db_max: 10

quantization:
  representative_n: 1000          # for INT8 PTQ calibration
  representative_balanced: true   # half positives, half negatives
