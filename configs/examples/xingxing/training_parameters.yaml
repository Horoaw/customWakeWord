train_dir: trained_models/xingxing
window_step_ms: 10
clip_duration_ms: 1500
features:
- features_dir: data/xingxing/features
  sampling_weight: 2.0
  penalty_weight: 1.0
  truth: true
  truncation_strategy: truncate_start
  type: mmap
- features_dir: data/xingxing/hard_negatives_features
  sampling_weight: 3.0
  penalty_weight: 5.0
  truth: false
  truncation_strategy: random
  type: mmap
- features_dir: data/negative_datasets/speech
  sampling_weight: 10.0
  penalty_weight: 1.0
  truth: false
  truncation_strategy: random
  type: mmap
- features_dir: data/negative_datasets/dinner_party
  sampling_weight: 15.0
  penalty_weight: 3.0
  truth: false
  truncation_strategy: random
  type: mmap
- features_dir: data/negative_datasets/dinner_party_eval
  sampling_weight: 0.0
  penalty_weight: 1.0
  truth: false
  truncation_strategy: split
  type: mmap
training_steps:
- 10000
positive_class_weight:
- 1
negative_class_weight:
- 20
learning_rates:
- 0.001
batch_size: 128
time_mask_max_size:
- 0
time_mask_count:
- 0
freq_mask_max_size:
- 0
freq_mask_count:
- 0
eval_step_interval: 500
target_minimization: 0.5
minimization_metric: null
maximization_metric: average_viable_recall
