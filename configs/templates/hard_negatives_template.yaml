# Template for the hard-negative (adversarial) phrases.
#
# Generated by `scripts/init_wake.py` from your wake phrases via:
#   (a) a phonetic-similarity heuristic over your wake phrases, and
#   (b) optionally, an LLM call (Together / OpenAI / local Ollama) via
#       `scripts/suggest_hard_negatives.py` for harder, less-obvious collisions.
#
# Hand-edit freely — this is the single highest-leverage knob in the pipeline.
# Whatever you actually expect to hear in deployment, list it here.

wake_name: "tofu"

buckets:
  - id: rhyme_collisions
    target_count: 600
    notes: "Words that rhyme with or end like your wake — common false-fire source."
    phrases:
      - "to-do list"
      - "to go"
      - "to you"
      - "thanks to you"
      - "two-fold"

  - id: greeting_no_wake
    target_count: 300
    notes: "Greetings that don't address your wake word."
    phrases:
      - "hey there"
      - "hi there"
      - "hello world"
      - "hey buddy"
      - "hi friend"
      - "hello everyone"

  - id: wake_no_greeting
    target_count: 500
    notes: "The wake word itself in non-greeting contexts — must NOT fire."
    phrases:
      - "tofu"
      - "tofu salad"
      - "I love tofu"
      - "this tofu is amazing"

  - id: contextual_use
    target_count: 300
    notes: "Wake word used as a regular noun/verb in normal speech."
    phrases:
      - "tofu burger"
      - "fried tofu"
      - "silken tofu"

  - id: near_match_words
    target_count: 200
    notes: "Words sharing 2+ phonemes with your wake."
    phrases:
      - "doofus"
      - "tutu"
      - "two pugs"

engines:
  - name: piper
    weight: 1.0
    voices: ALL

variation:
  speeds: [0.85, 0.95, 1.05, 1.15]
  random_seed: 4242

audio:
  sample_rate: 16000
  channels: 1
  format: wav
  trim_silence: true
  target_duration_s: 1.5
  pad_with_silence_if_short: true
