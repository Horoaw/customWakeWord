# Template for an ESPHome wake-word device using an evaluated model manifest.
# `manifest_url` must point to the JSON written by scripts/emit_manifest.py,
# published next to its referenced .tflite file.

esphome:
  name: tofu
  friendly_name: Tofu

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32_S3_SPIRAM_SUPPORT: y
      CONFIG_SPIRAM_MODE_OCT: y
      CONFIG_SPIRAM_SPEED_80M: y
      CONFIG_SPIRAM_CACHE_WORKAROUND: y
      CONFIG_ESPTOOLPY_FLASHSIZE_8MB: y

# Pin assignments below are for a generic ESP32-S3-DevKitC-1 + INMP441 I2S mic.
# Adjust to your hardware.
i2s_audio:
  i2s_lrclk_pin: GPIO5
  i2s_bclk_pin: GPIO6

microphone:
  - platform: i2s_audio
    id: tofu_mic
    i2s_din_pin: GPIO7
    pdm: false
    adc_type: external
    bits_per_sample: 32bit
    channel: right

micro_wake_word:
  microphone: tofu_mic
  vad:
  models:
    - model: "{{manifest_url}}"
  on_wake_word_detected:
    - logger.log:
        format: "wake word detected: %s"
        args: ['wake_word.c_str()']

logger:
  level: INFO

api:
ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
