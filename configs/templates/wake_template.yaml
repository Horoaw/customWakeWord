# Template for a custom wake-word project.
#
# This is a *structural* reference, not a fill-in-blanks file. Generate
# concrete configs with:
#
#   python scripts/init_wake.py --name sunny \
#       --phrases "hey sunny,hi sunny,hello sunny,okay sunny"
#
# That writes `configs/examples/sunny/wake_phrases.yaml` (and a matching
# `hard_negatives.yaml` with phonetically-plausible collisions) using the
# layout below.

wake_name: "tofu"   # lowercase slug — used in file paths and artefact names

phrases:
  - text: "hey tofu"          # primary trigger
    count: 5000               # synthetic samples to render
    weight: 1.0               # training loss weight
    notes: "Most common wake. Train heavily."
  - text: "hi tofu"
    count: 2500
    weight: 1.0
  - text: "hello tofu"
    count: 1500
    weight: 0.8
  - text: "okay tofu"
    count: 1000
    weight: 0.7

variation:
  speeds: [0.85, 0.95, 1.05, 1.15]
  emotions:
    parler:
      - "speaking calmly, neutral"
      - "speaking excitedly, slightly fast"
      - "speaking softly, almost whispering"
      - "speaking with a friendly child-like tone"
  random_seed: 42

engines:
  - name: piper
    weight: 0.5
    voices: ALL          # use every installed Piper voice
  - name: kokoro
    weight: 0.25
    voices: ALL_EN
  - name: melotts
    weight: 0.15
    voices: [EN-US, EN-BR, EN-AU, EN-IN]
  - name: parler
    weight: 0.10
    voices: [random_seed_grid_20]

audio:
  sample_rate: 16000
  channels: 1
  format: wav
  trim_silence: true
  target_duration_s: 1.5
  pad_with_silence_if_short: true
